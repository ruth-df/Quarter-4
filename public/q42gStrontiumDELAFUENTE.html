<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Rating System</title>
    <style>
        /* General Reset and Body Styling */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            margin: 0;
            color: #333;
        }

        /* Main Container Card */
        .container {
            background: #ffffff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 450px;
        }

        h2 {
            text-align: center;
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }

        /* Form Elements */
        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.9rem;
            color: #555;
        }

        input[type="text"],
        input[type="number"],
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
            background-color: #fafafa;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        select:focus {
            outline: none;
            border-color: #0d6efd;
            background-color: #fff;
        }

        /* Star Rating Logic (Right-to-Left for CSS sibling selectors) */
        .star-rating {
            display: flex;
            flex-direction: row-reverse;
            justify-content: flex-end;
        }

        .star-rating input {
            display: none;
        }

        .star-rating label {
            font-size: 30px;
            color: #e4e5e9;
            cursor: pointer;
            margin: 0;
            padding: 0 2px;
            transition: color 0.2s;
        }

        .star-rating input:checked ~ label,
        .star-rating label:hover,
        .star-rating label:hover ~ label {
            color: #ffc107;
        }

        /* Main Submit Button Styling */
        #movieForm button[type="submit"] {
            width: 100%;
            padding: 12px;
            background-color: #0d6efd;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            margin-top: 10px;
            margin-bottom: 30px;
            transition: background-color 0.2s;
        }

        #movieForm button[type="submit"]:hover {
            background-color: #0b5ed7;
        }

        hr {
            border: 0;
            height: 1px;
            background: #eee;
            margin-bottom: 20px;
        }

        /* Movie List Styling */
        .movie-list-header {
            text-align: center;
            margin-bottom: 15px;
        }

        .movie-item {
            border: 1px solid #eee;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            background-color: #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        .movie-title-line {
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 1.05rem;
        }

        .movie-details-line {
            color: #6c757d;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
        }
        
        .rating-stars-display {
            color: #ffc107;
            letter-spacing: 2px;
            margin-left: 5px;
            margin-right: 10px;
            font-size: 1.1rem;
        }

        /* Delete Button Styling */
        .delete-btn {
            margin-left: auto; /* Pushes button to the far right */
            padding: 4px 10px;
            background-color: #fff;
            color: #333;
            border: 1px solid #ccc;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: background-color 0.2s;
        }

        .delete-btn:hover {
            background-color: #f1f1f1;
        }

        .empty-state {
            text-align: center;
            color: #999;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Add / Update a Movie Rating</h2>
        
        <form id="movieForm">
            <div class="form-group">
                <label for="title">Title:</label>
                <input type="text" id="title" name="title" required placeholder="e.g., The Matrix">
            </div>
            
            <div class="form-group">
                <label for="year">Year:</label>
                <input type="number" id="year" name="year" required placeholder="e.g., 1999" min="1900" max="2100">
            </div>
            
            <div class="form-group">
                <label for="genre">Genre:</label>
                <select id="genre" name="genre" required>
                    <option value="" disabled selected>Select a genre</option>
                    <option value="Action">Action</option>
                    <option value="Comedy">Comedy</option>
                    <option value="Drama">Drama</option>
                    <option value="Horror">Horror</option>
                    <option value="Sci-Fi">Sci-Fi</option>
                    <option value="Romance">Romance</option>
                    <option value="Thriller">Thriller</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Rating:</label>
                <div class="star-rating">
                    <input type="radio" id="star5" name="rating" value="5" required />
                    <label for="star5" title="5 stars">&#9733;</label>
                    
                    <input type="radio" id="star4" name="rating" value="4" />
                    <label for="star4" title="4 stars">&#9733;</label>
                    
                    <input type="radio" id="star3" name="rating" value="3" />
                    <label for="star3" title="3 stars">&#9733;</label>
                    
                    <input type="radio" id="star2" name="rating" value="2" />
                    <label for="star2" title="2 stars">&#9733;</label>
                    
                    <input type="radio" id="star1" name="rating" value="1" />
                    <label for="star1" title="1 star">&#9733;</label>
                </div>
            </div>
            
            <button type="submit">Add Movie</button>
        </form>

        <hr>

        <h2 class="movie-list-header">Movie List</h2>
        <div id="movieList"></div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const movieForm = document.getElementById('movieForm');
            const movieListContainer = document.getElementById('movieList');

            // 1. Initialize data state
            let moviesArray = JSON.parse(localStorage.getItem('movies')) || [];

            const generateStarHTML = (ratingValue) => {
                const filledStar = '&#9733;';
                const emptyStar = '&#9734;';
                const rating = parseInt(ratingValue, 10);
                
                let html = '';
                for (let i = 0; i < 5; i++) {
                    html += (i < rating) ? filledStar : emptyStar;
                }
                return html;
            };

            // 2. Read Operation & Attach Delete Events
            const renderMovieList = () => {
                movieListContainer.innerHTML = '';

                if (moviesArray.length === 0) {
                    movieListContainer.innerHTML = '<p class="empty-state">No movies added yet.</p>';
                    return;
                }

                // Loop through movies array with index to target specific items for deletion
                moviesArray.forEach((movie, index) => {
                    const itemDiv = document.createElement('div');
                    itemDiv.classList.add('movie-item');

                    const starsHTML = generateStarHTML(movie.rating);

                    // Added the delete button to the HTML string
                    itemDiv.innerHTML = `
                        <div class="movie-title-line">${movie.title} (${movie.year})</div>
                        <div class="movie-details-line">
                            ${movie.genre}, Rating: <span class="rating-stars-display">${starsHTML}</span>
                            <button class="delete-btn" data-index="${index}">Delete</button>
                        </div>
                    `;
                    
                    movieListContainer.appendChild(itemDiv);
                });

                // Attach click event listeners to all newly created delete buttons
                document.querySelectorAll('.delete-btn').forEach(button => {
                    button.addEventListener('click', function() {
                        const idx = this.getAttribute('data-index');
                        
                        // Delete Confirmation (Requirement 4 & 5)
                        if (confirm('Are you sure you want to delete?')) {
                            // Remove the item from array
                            moviesArray.splice(idx, 1);
                            
                            // Save updated array to localStorage
                            localStorage.setItem('movies', JSON.stringify(moviesArray));
                            
                            // Re-render list to reflect deletion
                            renderMovieList();
                        }
                    });
                });
            };

            renderMovieList();

            // 3. Create / Update Operation
            movieForm.addEventListener('submit', (event) => {
                event.preventDefault();

                const titleInput = document.getElementById('title').value.trim();
                const yearInput = document.getElementById('year').value.trim();
                const genreInput = document.getElementById('genre').value;
                const ratingInput = document.querySelector('input[name="rating"]:checked').value;

                // Check if a movie with this title already exists (case-insensitive)
                const existingMovieIndex = moviesArray.findIndex(
                    movie => movie.title.toLowerCase() === titleInput.toLowerCase()
                );

                if (existingMovieIndex !== -1) {
                    // UPDATE OPERATION: Movie exists
                    const existingMovie = moviesArray[existingMovieIndex];
                    
                    // Overwrite year and genre
                    existingMovie.year = yearInput;
                    existingMovie.genre = genreInput;
                    
                    // Average the star rating (Math.round keeps it as a whole number for our 5-star display)
                    const oldRating = parseInt(existingMovie.rating, 10);
                    const newRating = parseInt(ratingInput, 10);
                    existingMovie.rating = Math.round((oldRating + newRating) / 2).toString();
                    
                } else {
                    // CREATE OPERATION: Movie does not exist
                    const newMovieObject = {
                        title: titleInput,
                        year: yearInput,
                        genre: genreInput,
                        rating: ratingInput
                    };
                    moviesArray.push(newMovieObject);
                }

                // Save to localStorage
                localStorage.setItem('movies', JSON.stringify(moviesArray));

                // Render UI changes
                renderMovieList();

                // Clear form
                movieForm.reset();
            });
        });
    </script>
</body>
</html>
