<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Rating System</title>
    <style>
        /* General Reset and Body Styling */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            margin: 0;
            color: #333;
        }

        /* Main Container Card */
        .container {
            background: #ffffff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 450px;
        }

        h2 {
            text-align: center;
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }

        /* Form Elements */
        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.9rem;
            color: #555;
        }

        input[type="text"],
        input[type="number"],
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
            background-color: #fafafa;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        select:focus {
            outline: none;
            border-color: #0d6efd;
            background-color: #fff;
        }

        /* Star Rating Logic (Right-to-Left for CSS sibling selectors) */
        .star-rating {
            display: flex;
            flex-direction: row-reverse;
            justify-content: flex-end;
        }

        .star-rating input {
            display: none; /* Hide standard radio buttons */
        }

        .star-rating label {
            font-size: 30px;
            color: #e4e5e9; /* Gray star */
            cursor: pointer;
            margin: 0;
            padding: 0 2px;
            transition: color 0.2s;
        }

        /* Highlight stars on hover and when checked */
        .star-rating input:checked ~ label,
        .star-rating label:hover,
        .star-rating label:hover ~ label {
            color: #ffc107; /* Golden yellow star */
        }

        /* Submit Button */
        button {
            width: 100%;
            padding: 12px;
            background-color: #0d6efd;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            margin-top: 10px;
            margin-bottom: 30px;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #0b5ed7;
        }

        /* Divider */
        hr {
            border: 0;
            height: 1px;
            background: #eee;
            margin-bottom: 20px;
        }

        /* Movie List Styling */
        .movie-list-header {
            text-align: center;
            margin-bottom: 15px;
        }

        .movie-item {
            border: 1px solid #eee;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            background-color: #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        .movie-title-line {
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 1.05rem;
        }

        .movie-details-line {
            color: #6c757d;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
        }
        
        .rating-stars-display {
            color: #ffc107;
            letter-spacing: 2px;
            margin-left: 5px;
            font-size: 1.1rem;
        }

        .empty-state {
            text-align: center;
            color: #999;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Add a Movie</h2>
        
        <form id="movieForm">
            <div class="form-group">
                <label for="title">Title:</label>
                <input type="text" id="title" name="title" required placeholder="e.g., The Matrix">
            </div>
            
            <div class="form-group">
                <label for="year">Year:</label>
                <input type="number" id="year" name="year" required placeholder="e.g., 1999" min="1900" max="2100">
            </div>
            
            <div class="form-group">
                <label for="genre">Genre:</label>
                <select id="genre" name="genre" required>
                    <option value="" disabled selected>Select a genre</option>
                    <option value="Action">Action</option>
                    <option value="Comedy">Comedy</option>
                    <option value="Drama">Drama</option>
                    <option value="Horror">Horror</option>
                    <option value="Sci-Fi">Sci-Fi</option>
                    <option value="Romance">Romance</option>
                    <option value="Thriller">Thriller</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Rating:</label>
                <div class="star-rating">
                    <input type="radio" id="star5" name="rating" value="5" required />
                    <label for="star5" title="5 stars">&#9733;</label>
                    
                    <input type="radio" id="star4" name="rating" value="4" />
                    <label for="star4" title="4 stars">&#9733;</label>
                    
                    <input type="radio" id="star3" name="rating" value="3" />
                    <label for="star3" title="3 stars">&#9733;</label>
                    
                    <input type="radio" id="star2" name="rating" value="2" />
                    <label for="star2" title="2 stars">&#9733;</label>
                    
                    <input type="radio" id="star1" name="rating" value="1" />
                    <label for="star1" title="1 star">&#9733;</label>
                </div>
            </div>
            
            <button type="submit">Add Movie</button>
        </form>

        <hr>

        <h2 class="movie-list-header">Movie List</h2>
        <div id="movieList"></div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // DOM Elements
            const movieForm = document.getElementById('movieForm');
            const movieListContainer = document.getElementById('movieList');

            // 1. Initialize data state
            // Retrieve data from localStorage and parse it. If null, start with empty array.
            let moviesArray = JSON.parse(localStorage.getItem('movies')) || [];

            // Helper function to generate visual stars based on numeric rating
            const generateStarHTML = (ratingValue) => {
                const filledStar = '&#9733;'; // Unicode solid star
                const emptyStar = '&#9734;'; // Unicode outline star
                const rating = parseInt(ratingValue, 10);
                
                let html = '';
                for (let i = 0; i < 5; i++) {
                    if (i < rating) {
                        html += filledStar;
                    } else {
                        html += emptyStar;
                    }
                }
                return html;
            };

            // 2. Read Operation: Render the list to the UI
            const renderMovieList = () => {
                // Clear the current display
                movieListContainer.innerHTML = '';

                // Handle empty state
                if (moviesArray.length === 0) {
                    movieListContainer.innerHTML = '<p class="empty-state">No movies added yet.</p>';
                    return;
                }

                // Loop through array and build HTML for each item
                moviesArray.forEach(movie => {
                    const itemDiv = document.createElement('div');
                    itemDiv.classList.add('movie-item');

                    const starsHTML = generateStarHTML(movie.rating);

                    itemDiv.innerHTML = `
                        <div class="movie-title-line">${movie.title} (${movie.year})</div>
                        <div class="movie-details-line">
                            ${movie.genre}, Rating: <span class="rating-stars-display">${starsHTML}</span>
                        </div>
                    `;
                    
                    movieListContainer.appendChild(itemDiv);
                });
            };

            // Render list on initial page load
            renderMovieList();

            // 3. Create Operation: Handle form submission
            movieForm.addEventListener('submit', (event) => {
                // Prevent page refresh on submit
                event.preventDefault();

                // Gather form data
                const titleInput = document.getElementById('title').value.trim();
                const yearInput = document.getElementById('year').value.trim();
                const genreInput = document.getElementById('genre').value;
                const ratingInput = document.querySelector('input[name="rating"]:checked').value;

                // Create movie object definition (JSON ready)
                const newMovieObject = {
                    title: titleInput,
                    year: yearInput,
                    genre: genreInput,
                    rating: ratingInput
                };

                // Add to array state
                moviesArray.push(newMovieObject);

                // Save updated array back to localStorage as a string
                localStorage.setItem('movies', JSON.stringify(moviesArray));

                // Update the visual list
                renderMovieList();

                // Clear the form fields for the next entry
                movieForm.reset();
            });
        });
    </script>
</body>
</html>
